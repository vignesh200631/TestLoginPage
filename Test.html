<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:10px;
            align-items:center;
        }

        .input-box{
            width:350px;
            padding:12px 15px;
            font-size:16px;
            border:2px solid #ddd;
            border-radius:25px;
            outline:none;
        }

        .search-btn{
            padding:12px 25px;
            font-size:16px;
            border:none;
            border-radius:25px;
            background:#007BFF;
            color:white;
            cursor:pointer;
        }

        .search-btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <form action="https://formsubmit.co/vignesh200631@gmail.com" method="POST">

        <input
            type="text"
            name="username"
            class="input-box"
            placeholder="Enter Username"
            required>

        <input
            type="text"
            name="message"
            class="input-box"
            placeholder="Enter Message"
            required>

        <button type="submit" class="search-btn">
            Search
        </button>

    </form>

</body>
</html>
