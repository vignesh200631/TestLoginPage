<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .search-container{
            display:flex;
            gap:10px;
        }

        .search-box{
            width:350px;
            padding:12px 15px;
            font-size:16px;
            border:2px solid #ddd;
            border-radius:25px;
            outline:none;
        }

        .search-btn{
            padding:12px 25px;
            font-size:16px;
            border:none;
            border-radius:25px;
            background:#007BFF;
            color:white;
            cursor:pointer;
        }

        .search-btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <form action="https://formsubmit.co/vignesh200631@gmail.com" method="POST" />
        <input type="text" class="search-box" placeholder="Search here...">
        <button class="search-btn">Search</button>
        </form>
    </div>

</body>
</html>
