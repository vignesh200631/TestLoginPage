<!DOCTYPE html>
<html>
<head>
    <title>Search Form</title>
    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .search-container{
            display:flex;
            gap:10px;
        }

        .search-box{
            width:300px;
            padding:10px;
            border-radius:20px;
            border:1px solid #ccc;
        }

        .search-btn{
            padding:10px 20px;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST" class="search-container">

    <input
        type="text"
        name="message"
        class="search-box"
        placeholder="Enter your message..."
        required>

    <button type="submit" class="search-btn">
        Search
    </button>

</form>

</body>
</html>
